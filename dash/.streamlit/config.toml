[theme]
primaryColor = "#1a73e8"
backgroundColor = "#0e1117"
secondaryBackgroundColor = "#1a1f2e"
textColor = "#fafafa"
font = "sans serif"

[server]
maxUploadSize = 0
# Served under crucible.nousergon.ai/dash via the crucible-live-proxy Worker
# (same path-proxy pattern as /live; nous-ergon-ops/cloudflare/). Assets +
# websocket resolve under /dash.
baseUrlPath = "dash"
# Same Tornado same-host gotcha as live/.streamlit/config.toml: the proxy
# forwards browser Origin: https://crucible.nousergon.ai while Host stays the
# origin host, so the WebSocket handshake is rejected without this allowlist.
corsAllowedOrigins = ["https://crucible.nousergon.ai"]

[browser]
gatherUsageStats = false
