# /etc/nginx/conf.d/nousergon.conf
#
# Serves Streamlit apps behind Cloudflare:
#   live.nousergon.ai        → public portfolio page  (port 8502)  ← canonical
#   nousergon.ai             → public portfolio page  (port 8502)  ← deprecated, apex cuts over to Astro/CF Pages
#   console.nousergon.ai     → private full dashboard (port 8501)  ← canonical
#   dashboard.nousergon.ai   → private full dashboard (port 8501)  ← deprecated, sunset ~2 weeks after console rolls out
#   portfolio.nousergon.ai   → RETIRED 2026-07-22 (301 → metron.nousergon.ai/dash at the CF edge)
#   telos-dash.nousergon.ai  → private Telos dashboard  (port 3001)  ← year-round tax planning (repo: nousergon/telos); Access-gated; public URL telos.nousergon.ai/dash via Worker
#
# Cutover sequence (2026-05-22):
#   1. Deploy this nginx update — adds live.nousergon.ai to the :8502 server_name
#      so Streamlit answers on the new canonical hostname WITHOUT removing apex.
#   2. DNS adds live.nousergon.ai → existing EC2 (CF dashboard or API).
#   3. Verify live.nousergon.ai serves the same content as the apex.
#   4. CF Pages project created + Astro deployed.
#   5. CF Pages custom-domain binding flips nousergon.ai apex + www → CF Pages.
#      apex stops hitting this nginx; Streamlit traffic now arrives only on
#      live.nousergon.ai. Apex + www can be dropped from this config in a
#      follow-up PR after the cutover bakes.
#
# SSL terminated by Cloudflare Origin CA certificate (SAN: *.nousergon.ai + nousergon.ai).
# Cloudflare Access protects both private hostnames at the edge (zero code changes).
#
# Deploy: auto-applied on every push to main by `.github/workflows/deploy.yml`
# → SSM → `infrastructure/deploy-on-merge.sh`'s nginx-on-diff step, which
# stages, validates via `nginx -t`, atomically swaps + reloads nginx (and
# reverts on validation failure). The legacy manual recipe was:
#   sudo cp infrastructure/nginx.conf /etc/nginx/conf.d/nousergon.conf
#   sudo nginx -t && sudo systemctl reload nginx
# Retained for emergency / SSM-direct invocations only.

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name live.nousergon.ai nousergon.ai www.nousergon.ai console.nousergon.ai dashboard.nousergon.ai telos-dash.nousergon.ai;
    return 301 https://$host$request_uri;
}

# Public site (Streamlit portfolio page — :8502)
# live.nousergon.ai is the new canonical hostname (post-2026-05-22 apex cutover);
# nousergon.ai + www.nousergon.ai are retained during the bake window so traffic
# hitting the apex via DNS-cache lag still serves the same content. Drop them
# from server_name after the CF Pages cutover bakes (~1 week).
server {
    listen 443 ssl;
    server_name live.nousergon.ai nousergon.ai www.nousergon.ai;

    ssl_certificate     /etc/ssl/certs/cloudflare-origin.pem;
    ssl_certificate_key /etc/ssl/private/cloudflare-origin.key;

    # Rewrite Streamlit's default OG meta tags for link previews
    sub_filter_once off;
    sub_filter_types text/html;
    sub_filter '<meta property="og:site_name" content="Streamlit"' '<meta property="og:site_name" content="Nous Ergon: Alpha Engine"';
    sub_filter '<meta property="og:title" content="Streamlit"' '<meta property="og:title" content="Nous Ergon: Alpha Engine"';
    sub_filter '<meta name="description" content="Streamlit' '<meta name="description" content="AI-driven autonomous trading system generating alpha over the S&P 500. Built by Brian McMahon.';

    # Blog — static Hugo site served from /var/www/blog/
    # Built from alpha-engine-dashboard/blog/ via Hugo, deployed by blog/deploy.sh
    location = /blog {
        return 301 /blog/;
    }

    location /blog/ {
        alias /var/www/blog/;
        try_files $uri $uri/ /blog/index.html;
    }

    # Crucible experiment-results surface (config#1957/#1973): reached as
    # crucible.nousergon.ai/dash via the crucible-live-proxy Worker (same
    # path-proxy pattern as /live), gated by Cloudflare Access on that route.
    # 9-D cutover (plan §9.5): crucible-dash-web.service (Next.js,
    # basePath=/dash) on :3002. Rollback = point this proxy_pass back at
    # :8504 (the Streamlit skin, kept running for the soak window).
    location /dash {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Accept-Encoding "";
        proxy_read_timeout 86400;
    }

    location / {
        proxy_pass http://127.0.0.1:8502;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Accept-Encoding "";
        proxy_read_timeout 86400;
    }
}

# Private dashboard (protected by Cloudflare Access on both hostnames)
# Both server_names share one block — identical handling.
# After sunset window, drop dashboard.nousergon.ai from server_name and the redirect block above.
server {
    listen 443 ssl;
    server_name console.nousergon.ai dashboard.nousergon.ai;

    ssl_certificate     /etc/ssl/certs/cloudflare-origin.pem;
    ssl_certificate_key /etc/ssl/private/cloudflare-origin.key;

    location / {
        proxy_pass http://127.0.0.1:8501;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }
}

# (portfolio.nousergon.ai server block removed 2026-07-22 — deprecated per Brian's
# ruling; metron.nousergon.ai/dash is the sole Metron app entry. The hostname 301s
# to /dash at the Cloudflare edge (nous-ergon-ops/cloudflare/portfolio-redirect)
# and never reaches this origin. metron-web.service (:3000) retired with it.)

# Telos web — year-round tax planning dashboard (repo: nousergon/telos). Public canonical
# URL is telos.nousergon.ai/dash (Cloudflare Worker → this origin). MUST stay behind
# Cloudflare Access — personal operator surface, not part of Metron beta/demo.
server {
    listen 443 ssl;
    server_name telos-dash.nousergon.ai;

    ssl_certificate     /etc/ssl/certs/cloudflare-origin.pem;
    ssl_certificate_key /etc/ssl/private/cloudflare-origin.key;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }
}

# Metron /dash — SECOND Next.js process from the metron repo (metron-ops#180),
# built with basePath=/dash. Public canonical URL is metron.nousergon.ai/dash
# (Cloudflare Worker metron-dash-proxy → this origin). MUST stay behind Cloudflare
# Access (the "Metron" Access app). Inert until the metron-dash.nousergon.ai DNS
# record and the metron-dash-web.service process (:3003) exist.
#
# X-Forwarded-Host (metron-ops#193): the Worker now sets this to the public
# canonical hostname (metron.nousergon.ai) it was reached on. Forward that
# through as-is instead of overwriting it with $host (this vhost's internal
# name) — Next.js 14's Server Action same-origin check compares
# x-forwarded-host against the browser's Origin and hard-rejects on
# mismatch. When $http_x_forwarded_host is empty (direct access to this
# vhost, bypassing the Worker), nginx omits the header entirely (its
# documented behavior for an empty proxy_set_header value), so Next.js
# falls back to comparing Origin against Host, which is self-consistent
# for that path too.
server {
    listen 443 ssl;
    server_name metron-dash.nousergon.ai;

    ssl_certificate     /etc/ssl/certs/cloudflare-origin.pem;
    ssl_certificate_key /etc/ssl/private/cloudflare-origin.key;

    location / {
        proxy_pass http://127.0.0.1:3003;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $http_x_forwarded_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }
}
