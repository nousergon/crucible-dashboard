# Standard fleet Dependabot config (weekly, grouped minor+patch) — alpha-engine-config-I2525
# Majors are grouped into their own PR, split from minor/patch — alpha-engine-config-I2734
#
# NOTE: Dependabot requires a unique (package-ecosystem, directory, target-branch)
# combination across `updates` entries, so majors can't live in a second entry on
# a different (monthly) schedule for the same directory — that collides with the
# minor/patch entry ("Ecosystem '<x>' has overlapping directories"). Instead, each
# ecosystem below is a single weekly entry with two groups: minor/patch updates and
# major updates land in separate PRs, both on the weekly cadence.
version: 2
updates:
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
      majors:
        update-types:
          - major

  - package-ecosystem: npm
    directories:
      - "/dash-web"
      - "/marketing"
      - "/marketing-apex"
      - "/marketing-dev"
      - "/marketing-finance"
      - "/marketing-metron"
      - "/marketing-telos"
      - "/marketing-vires"
    schedule:
      interval: weekly
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
      majors:
        update-types:
          - major
    ignore:
      # @astrojs/check (latest 0.9.9) peers on typescript "^5 || ^6"; a TS
      # semver-major (7.x) breaks `npm ci` with ERESOLVE across the Astro
      # marketing sites (marketing-metron/#431 + marketing-telos/#432 both
      # reddened main-branch marketing-ci, 2026-07-16). Hold TypeScript on
      # 6.x until @astrojs/check ships TS7 peer support, then lift this.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
      majors:
        update-types:
          - major
