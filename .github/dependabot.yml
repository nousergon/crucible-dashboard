# Standard fleet Dependabot config (weekly, grouped minor+patch) — alpha-engine-config-I2525
# Majors ride separate individual PRs deliberately (scrutiny before merge).
version: 2
updates:
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
  - package-ecosystem: npm
    directories:
      - "/dash-web"
      - "/marketing"
      - "/marketing-apex"
      - "/marketing-dev"
      - "/marketing-finance"
      - "/marketing-metron"
      - "/marketing-telos"
      - "/marketing-vires"
    schedule:
      interval: weekly
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
    ignore:
      # @astrojs/check (latest 0.9.9) peers on typescript "^5 || ^6"; a TS
      # semver-major (7.x) breaks `npm ci` with ERESOLVE across the Astro
      # marketing sites (marketing-metron/#431 + marketing-telos/#432 both
      # reddened main-branch marketing-ci, 2026-07-16). Hold TypeScript on
      # 6.x until @astrojs/check ships TS7 peer support, then lift this.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      # next 16 requires Node >=20.9; the dash-web deploy box's Node major
      # is not yet confirmed >=20.9 (config#2711). A major auto-merged here
      # builds fine in CI (GitHub-hosted runner) but can still fail the
      # separate on-box `next build` at deploy time. Hold until the box is
      # confirmed/upgraded and the Next 16 migration is done deliberately.
      - dependency-name: "next"
        update-types: ["version-update:semver-major"]
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
