# Standard fleet Dependabot config (weekly, grouped minor+patch) — alpha-engine-config-I2525
# Majors are surfaced as ONE grouped PR per ecosystem, throttled by a 30-day
# major-version cooldown — alpha-engine-config-I2734. NOTE: Dependabot requires a
# unique (package-ecosystem, directory, target-branch) per update config, so the
# I2734 intent CANNOT be a second per-ecosystem block on its own monthly schedule
# (that shape is invalid and disables ALL updates for the repo). The `majors`
# group + `cooldown.semver-major-days: 30` below is the closest legal expression.
version: 2
updates:
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
    cooldown:
      semver-major-days: 30
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
      majors:
        update-types:
          - major

  - package-ecosystem: npm
    directories:
      - "/dash-web"
      - "/marketing"
      - "/marketing-apex"
      - "/marketing-dev"
      - "/marketing-finance"
      - "/marketing-metron"
      - "/marketing-telos"
      - "/marketing-vires"
    schedule:
      interval: weekly
    cooldown:
      semver-major-days: 30
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
      majors:
        update-types:
          - major
    ignore:
      # @astrojs/check (latest 0.9.9) peers on typescript "^5 || ^6"; a TS
      # semver-major (7.x) breaks `npm ci` with ERESOLVE across the Astro
      # marketing sites (marketing-metron/#431 + marketing-telos/#432 both
      # reddened main-branch marketing-ci, 2026-07-16). Hold TypeScript on
      # 6.x until @astrojs/check ships TS7 peer support, then lift this.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      # next 16 (already merged onto dash-web, #460) required Node >=20.9;
      # the dash-web deploy box's Node major was not pinned to any single
      # source of truth, so a Dependabot major that's green in CI (GitHub-
      # hosted runner) could still silently fail the separate on-box `next
      # build` at deploy time (config#2711 — exactly what happened with
      # #460). dash-web/.nvmrc is now that source of truth (parity target:
      # Node 22) and infrastructure/deploy-on-merge.sh fails loud on
      # mismatch, but a FUTURE next major can still need a newer Node major
      # than the box has — hold future next majors for deliberate review
      # rather than auto-merging.
      - dependency-name: "next"
        update-types: ["version-update:semver-major"]
      # astro 7.1.0 carries an upstream static-build regression: `astro build`
      # aborts with "rollupOptions.input should not be an html file when
      # building for SSR" for a `output: "static"` site, breaking `npm run
      # build` (astro check && astro build) and reddening main deploy-marketing.
      # Dependabot opened the astro 6→7 major once per marketing directory —
      # marketing-apex/#495 + marketing-dev/#497 (reverted #500/#501) and then
      # marketing/#499 (reverted here) all reddened main the same day
      # (2026-07-21, config#... ci-watch). Hold astro on 6.x across all
      # marketing sites until the upstream static-build regression is fixed,
      # then lift this.
      - dependency-name: "astro"
        update-types: ["version-update:semver-major"]

  # NOTE: no cooldown here — Dependabot rejects cooldown.semver-major-days for
  # the github-actions ecosystem (semver cooldown keys are per-ecosystem; pip
  # supports them, actions does not — validated live 2026-07-16). The majors
  # group alone carries the I2734 grouping intent for actions.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
      majors:
        update-types:
          - major
