name: Deploy

# Auto-deploys console.nousergon.ai + nousergon.ai on every push to main.
#
# The streamlit services run from this repo on a single EC2 instance
# (id in the DASHBOARD_INSTANCE_ID repo variable). They do NOT auto-restart on code-only changes —
# boot-pull's daily 12:00-UTC timer only restarts services whose .service
# unit files change. This workflow closes that "merged but stale" gap.
#
# Mechanism: GHA assumes the OIDC role, calls SSM send-command on the
# dashboard instance, which runs infrastructure/deploy-on-merge.sh —
# git fetch + reset to the workflow-pinned SHA, lib refresh, restart
# both streamlit services, health-check both /_stcore/health endpoints.
#
# Boot-pull stays as the daily safety net for ALL repos + drift catch.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy dashboard via SSM
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      # Dashboard EC2 instance, sourced from the repo variable (not hardcoded)
      # so the box identifier lives in one place. Set via: gh variable set
      # DASHBOARD_INSTANCE_ID. Non-secret identifier — a variable, not a secret.
      DASHBOARD_INSTANCE_ID: ${{ vars.DASHBOARD_INSTANCE_ID }}

    steps:
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::711398986525:role/github-actions-lambda-deploy
          aws-region: us-east-1

      - name: Send SSM deploy command
        id: send
        run: |
          set -euo pipefail
          # Two-phase command body:
          #   1. Pull a deterministic ref (the workflow's commit SHA) as
          #      ec2-user — this refreshes the deploy script itself before
          #      we invoke it.
          #   2. Run the freshly-pulled deploy script as root (default
          #      SSM user) so systemctl restart needs no further sudo.
          #
          # Pinning to GITHUB_SHA (not origin/main) guards against a
          # back-to-back merge racing this deploy.
          CMD_BODY="set -e; cd /home/ec2-user/alpha-engine-dashboard && sudo -u ec2-user git fetch origin --quiet && sudo -u ec2-user git reset --hard ${GITHUB_SHA} --quiet && bash infrastructure/deploy-on-merge.sh ${GITHUB_SHA}"
          CMD_ID=$(aws ssm send-command \
            --instance-ids ${DASHBOARD_INSTANCE_ID} \
            --document-name AWS-RunShellScript \
            --comment "alpha-engine-dashboard deploy ${GITHUB_SHA}" \
            --parameters "commands=[\"${CMD_BODY}\"]" \
            --query 'Command.CommandId' \
            --output text)
          echo "command_id=${CMD_ID}" >> "$GITHUB_OUTPUT"
          echo "Sent SSM command: ${CMD_ID}"

      - name: Wait for SSM command to finish
        run: |
          aws ssm wait command-executed \
            --instance-id ${DASHBOARD_INSTANCE_ID} \
            --command-id "${{ steps.send.outputs.command_id }}"

      - name: Fetch deploy output
        if: always()
        run: |
          set +e
          # StatusDetails + elapsed time make delivery-vs-script failure
          # self-classifying (config#2224): a terminal Failed in <1s with empty
          # output means the command never EXECUTED on the box (SSM agent
          # down / disk full — the config#2227 signature), which no rerun can
          # heal — vs a real deploy-script failure, which the stderr below
          # explains.
          read -r STATUS DETAILS ELAPSED <<< "$(aws ssm get-command-invocation \
            --instance-id ${DASHBOARD_INSTANCE_ID} \
            --command-id "${{ steps.send.outputs.command_id }}" \
            --query '[Status,StatusDetails,ExecutionElapsedTime]' --output text)"
          echo "status=$STATUS details=$DETAILS elapsed=$ELAPSED"
          if [ "$STATUS" = "Failed" ] && printf '%s' "$ELAPSED" | grep -qE '^PT0\.[0-9]+S$'; then
            echo "::error::SSM DELIVERY FAILURE — command never executed on the box (elapsed $ELAPSED, host-side fault: agent down or disk full, config#2227 signature). Rerunning the workflow cannot heal this; fix the instance first."
          fi
          echo "── stdout ──"
          aws ssm get-command-invocation \
            --instance-id ${DASHBOARD_INSTANCE_ID} \
            --command-id "${{ steps.send.outputs.command_id }}" \
            --query 'StandardOutputContent' --output text
          echo "── stderr ──"
          aws ssm get-command-invocation \
            --instance-id ${DASHBOARD_INSTANCE_ID} \
            --command-id "${{ steps.send.outputs.command_id }}" \
            --query 'StandardErrorContent' --output text

      - name: Ensure box disk alarm exists (alarm-as-code, config#2227)
        run: |
          # Idempotent: put-metric-alarm creates or updates in place. Pages the
          # alpha-engine-alerts SNS (Telegram) when the box's root disk crosses
          # 90% — or when the metric GOES MISSING for 3 periods, which catches
          # the box/agent/watchdog being too broken to publish at all (the
          # 2026-07-11 disk-full-killed-SSM class). Metric is published every
          # 10 min by box_health.sh (AlphaEngine/Box namespace).
          aws cloudwatch put-metric-alarm \
            --alarm-name alpha-engine-dashboard-box-disk-critical \
            --alarm-description "Dashboard EC2 root disk >=90% or box health metric missing (config#2227)" \
            --namespace AlphaEngine/Box --metric-name disk_used_percent \
            --dimensions Name=InstanceId,Value=${DASHBOARD_INSTANCE_ID} \
            --statistic Maximum --period 600 \
            --evaluation-periods 3 --datapoints-to-alarm 2 \
            --threshold 90 --comparison-operator GreaterThanOrEqualToThreshold \
            --treat-missing-data breaching \
            --alarm-actions arn:aws:sns:us-east-1:711398986525:alpha-engine-alerts \
            --ok-actions arn:aws:sns:us-east-1:711398986525:alpha-engine-alerts

      - name: Append to system-wide deploy changelog
        if: always()
        uses: nousergon/nousergon-docs/.github/actions/append-changelog@main
        with:
          deploy_status: ${{ job.status == 'success' && 'success' || 'failure' }}
          deploy_workflow: deploy.yml

  # Alert (Telegram) on genuine post-merge failure of this workflow on the
  # default branch. Reusable workflow + transport in nousergon-lib. config#1128.
  notify-main-failure:
    needs: [deploy]
    if: ${{ failure() && github.ref == 'refs/heads/main' }}
    uses: nousergon/nousergon-lib/.github/workflows/notify-ci-failure.yml@main
    secrets: inherit
