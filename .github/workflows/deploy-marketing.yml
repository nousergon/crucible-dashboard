name: deploy-marketing

# Deploys the seven Astro static sites to their Cloudflare Pages projects on
# push to main — the durable replacement for the CF git-integration, which was
# observed silently NOT firing on merge (config#1317: nousergon.ai served stale
# copy for a week after a merge because no CF build triggered). Deploy lives in
# the repo (version-controlled, auditable) like infrastructure/deploy.yml, not
# in a CF-dashboard webhook we can't see or test.
#
# Mapping (site dir -> Cloudflare Pages project -> domain):
#   marketing-apex   -> nousergon-marketing -> nousergon.ai
#   marketing        -> nousergon-crucible  -> crucible.nousergon.ai
#   marketing-metron -> nousergon-metron    -> metron.nousergon.ai
#   marketing-vires  -> nousergon-vires     -> fitness.nousergon.ai (vires.nousergon.ai = the live Vires APP, never attach it here)
#   marketing-finance-> nousergon-finance   -> finance.nousergon.ai
#   marketing-dev    -> nousergon-dev       -> dev.nousergon.ai
#   marketing-telos  -> nousergon-telos     -> telos.nousergon.ai (/dash via Worker)
#
# IMPORTANT: the deploy step runs INSIDE each site directory (workingDirectory)
# and deploys `dist` as a relative path. `wrangler pages deploy` only bundles a
# `functions/` directory it finds in the CURRENT WORKING DIRECTORY — the original
# repo-root `pages deploy <site>/dist` form silently shipped the static site
# WITHOUT the Pages Functions, which broke the Metron waitlist API (POST /api/
# waitlist → 405) from 2026-06-28 until 2026-07-02. Sites without a functions/
# dir are unaffected either way; never revert to the repo-root form.
#
# Triggers:
#   push:main          -> deploy the sites whose paths changed (paths-filter).
#                         A change to THIS workflow file redeploys ALL sites —
#                         deploy-logic fixes must reach every project.
#   workflow_dispatch  -> force-deploy ALL sites (use to publish a backlog of
#                         already-merged copy, or to validate the pipeline)
#
# Requires repo secret CLOUDFLARE_API_TOKEN (Cloudflare Pages: Edit) and repo
# variable CLOUDFLARE_ACCOUNT_ID. Build (astro check) already gates merge via
# marketing-ci.yml; this re-builds from the merged tree and uploads dist/.

on:
  push:
    branches: [main]
    paths:
      - marketing/**
      - marketing-apex/**
      - marketing-metron/**
      - marketing-vires/**
      - marketing-finance/**
      - marketing-dev/**
      - marketing-telos/**
      - blog/**
      - .github/workflows/deploy-marketing.yml
  workflow_dispatch:

concurrency:
  group: deploy-marketing-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  changes:
    name: detect changed sites
    runs-on: ubuntu-latest
    outputs:
      apex: ${{ steps.decide.outputs.apex }}
      crucible: ${{ steps.decide.outputs.crucible }}
      metron: ${{ steps.decide.outputs.metron }}
      vires: ${{ steps.decide.outputs.vires }}
      finance: ${{ steps.decide.outputs.finance }}
      dev: ${{ steps.decide.outputs.dev }}
      telos: ${{ steps.decide.outputs.telos }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        if: github.event_name == 'push'
        with:
          # Every filter includes this workflow file: a deploy-logic change must
          # redeploy every site (that's also how the 2026-07 functions-bundling
          # fix reached the already-merged metron copy).
          filters: |
            apex:
              - 'marketing-apex/**'
              - 'blog/**'
              - '.github/workflows/deploy-marketing.yml'
            crucible:
              - 'marketing/**'
              - '.github/workflows/deploy-marketing.yml'
            metron:
              - 'marketing-metron/**'
              - '.github/workflows/deploy-marketing.yml'
            vires:
              - 'marketing-vires/**'
              - '.github/workflows/deploy-marketing.yml'
            finance:
              - 'marketing-finance/**'
              - '.github/workflows/deploy-marketing.yml'
            dev:
              - 'marketing-dev/**'
              - '.github/workflows/deploy-marketing.yml'
            telos:
              - 'marketing-telos/**'
              - '.github/workflows/deploy-marketing.yml'
      - name: Decide (force-all on manual dispatch)
        id: decide
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "apex=true"     >> "$GITHUB_OUTPUT"
            echo "crucible=true" >> "$GITHUB_OUTPUT"
            echo "metron=true"   >> "$GITHUB_OUTPUT"
            echo "vires=true"    >> "$GITHUB_OUTPUT"
            echo "finance=true"  >> "$GITHUB_OUTPUT"
            echo "dev=true"      >> "$GITHUB_OUTPUT"
            echo "telos=true"    >> "$GITHUB_OUTPUT"
          else
            echo "apex=${{ steps.filter.outputs.apex }}"         >> "$GITHUB_OUTPUT"
            echo "crucible=${{ steps.filter.outputs.crucible }}" >> "$GITHUB_OUTPUT"
            echo "metron=${{ steps.filter.outputs.metron }}"     >> "$GITHUB_OUTPUT"
            echo "vires=${{ steps.filter.outputs.vires }}"       >> "$GITHUB_OUTPUT"
            echo "finance=${{ steps.filter.outputs.finance }}"   >> "$GITHUB_OUTPUT"
            echo "dev=${{ steps.filter.outputs.dev }}"           >> "$GITHUB_OUTPUT"
            echo "telos=${{ steps.filter.outputs.telos }}"       >> "$GITHUB_OUTPUT"
          fi

  deploy:
    name: deploy ${{ matrix.project }}
    needs: changes
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # has_functions: sites with a functions/ dir get a post-deploy probe of
          # the waitlist API — the guard against the silent static-only-ship bug
          # class (metron 405 outage, 2026-06-28 → 2026-07-02).
          - site: marketing-apex
            project: nousergon-marketing
            changed: ${{ needs.changes.outputs.apex }}
            has_functions: false
          - site: marketing
            project: nousergon-crucible
            changed: ${{ needs.changes.outputs.crucible }}
            has_functions: false
          - site: marketing-metron
            project: nousergon-metron
            changed: ${{ needs.changes.outputs.metron }}
            has_functions: true
            analytics_token: ${{ vars.CF_ANALYTICS_TOKEN_METRON }}
          - site: marketing-vires
            project: nousergon-vires
            changed: ${{ needs.changes.outputs.vires }}
            has_functions: true
            analytics_token: ${{ vars.CF_ANALYTICS_TOKEN_VIRES }}
          - site: marketing-finance
            project: nousergon-finance
            changed: ${{ needs.changes.outputs.finance }}
            has_functions: false
            analytics_token: ${{ vars.CF_ANALYTICS_TOKEN_FINANCE }}
          - site: marketing-dev
            project: nousergon-dev
            changed: ${{ needs.changes.outputs.dev }}
            has_functions: false
            analytics_token: ${{ vars.CF_ANALYTICS_TOKEN_DEV }}
          - site: marketing-telos
            project: nousergon-telos
            changed: ${{ needs.changes.outputs.telos }}
            has_functions: false
    steps:
      - name: Checkout
        if: matrix.changed == 'true'
        uses: actions/checkout@v4

      - name: Setup Node
        if: matrix.changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: ${{ matrix.site }}/package-lock.json

      - name: Install + build (astro check && astro build)
        if: matrix.changed == 'true'
        working-directory: ${{ matrix.site }}
        env:
          # Web Analytics beacon token, per-site (astro reads PUBLIC_* at build
          # time — see marketing-{metron,vires,finance,dev}/src/pages/index.astro).
          # Unset repo var -> empty string -> astro omits the beacon (safe no-op).
          PUBLIC_CF_ANALYTICS_TOKEN: ${{ matrix.analytics_token }}
        run: |
          npm ci
          npm run build

      # wrangler pages deploy requires the CF Pages project to ALREADY exist —
      # it does NOT auto-create. Adding a site to the matrix must be sufficient
      # to ship it; provisioning was an undocumented manual dashboard click, so
      # telos first-deploy went red 'Project not found [8000007]' (2026-07-05).
      - name: Ensure Cloudflare Pages project exists (idempotent self-provision)
        if: matrix.changed == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          proj="${{ matrix.project }}"
          if npx --yes wrangler@3.90.0 pages project list 2>/dev/null \
              | grep -qE "(^|[[:space:]])${proj}([[:space:]]|$)"; then
            echo "Cloudflare Pages project ${proj} already exists — nothing to do."
          else
            echo "Creating Cloudflare Pages project ${proj} (Direct Upload, prod branch main)."
            npx --yes wrangler@3.90.0 pages project create "${proj}" --production-branch=main
          fi

      - name: Deploy to Cloudflare Pages (production)
        if: matrix.changed == 'true'
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          # Run INSIDE the site dir: wrangler only bundles functions/ from the
          # cwd (see header comment — the repo-root form dropped the Metron
          # waitlist Pages Function). `dist` is relative to workingDirectory.
          workingDirectory: ${{ matrix.site }}
          command: pages deploy dist --project-name=${{ matrix.project }} --branch=main

      # Post-deploy smoke probe against the production alias (<project>.pages.dev
      # serves the main-branch deployment; probing it works before any custom
      # domain is attached). Two checks:
      #   1. homepage answers 200 (static assets shipped)
      #   2. functions sites only: POST /api/waitlist with an invalid email
      #      answers 400 — proof the Pages Function is bundled and validating.
      #      A static-only ship answers 405, which is exactly the failure this
      #      guard exists to catch (metron outage 2026-06-28 → 2026-07-02).
      # Retries cover deploy propagation lag; failure fails the workflow loudly.
      - name: Smoke-probe deployed site
        if: matrix.changed == 'true'
        run: |
          base="https://${{ matrix.project }}.pages.dev"
          probe() {
            local desc="$1" expected="$2"; shift 2
            for i in $(seq 1 6); do
              code=$(curl -s -o /dev/null -w "%{http_code}" "$@")
              if [ "$code" = "$expected" ]; then
                echo "OK: $desc -> $code"
                return 0
              fi
              echo "attempt $i/6: $desc -> $code (want $expected); retrying in 10s"
              sleep 10
            done
            echo "FAIL: $desc still $code after 6 attempts (want $expected)" >&2
            return 1
          }
          probe "homepage" 200 "$base/"
          if [ "${{ matrix.has_functions }}" = "true" ]; then
            probe "waitlist function validates" 400 \
              -X POST "$base/api/waitlist" \
              -H "content-type: application/json" \
              --data '{"email":"not-an-email"}'
          fi

  notify-main-failure:
    needs: [deploy]
    if: ${{ failure() && github.ref == 'refs/heads/main' }}
    uses: nousergon/nousergon-lib/.github/workflows/notify-ci-failure.yml@main
    secrets: inherit
