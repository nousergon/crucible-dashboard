name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:

jobs:
  dash-web:
    # Crucible /dash Next.js frontend (config#1973 9-C): vitest + typecheck +
    # production build so a TS or build break can't reach the merge deploy.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version-file: dash-web/.nvmrc
          cache: npm
          cache-dependency-path: dash-web/package-lock.json
      - name: Install
        working-directory: dash-web
        run: npm ci --no-audit --no-fund
      - name: Unit tests
        working-directory: dash-web
        run: npm test
      - name: Typecheck
        working-directory: dash-web
        run: npm run typecheck
      - name: Production build
        working-directory: dash-web
        run: npm run build

  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version-file: .python-version

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest ruff

      - name: Lint (undefined names / unused imports)
        run: ruff check --select F821,F401 .

      - name: Run tests
        run: pytest tests/ -v

      - name: Security audit
        run: |
          pip install pip-audit
          IGNORE_ARGS=()
          if [ -f .github/pip-audit-ignore.txt ]; then
            while IFS= read -r vuln_id; do
              IGNORE_ARGS+=(--ignore-vuln "$vuln_id")
            done < <(grep -vE '^\s*#|^\s*$' .github/pip-audit-ignore.txt)
          fi
          pip-audit "${IGNORE_ARGS[@]}"

  # Lockfile compile-target guard (alpha-engine-config#2791): requirements.txt
  # is a uv-compiled lockfile. Nothing previously verified it was compiled
  # for the SAME Python version the box venv (and this job's `test` above)
  # actually installs it under — a lockfile compiled against a newer
  # interpreter can pin versions with no wheel for the SSoT version, and CI's
  # `pip install` on a matching-version runner won't necessarily catch a
  # resolution that's only reachable via a different compiler pass. This job
  # re-resolves requirements.in with uv, pinned to .python-version, and fails
  # if that resolution can't be installed under the same interpreter — so a
  # lockfile compiled against the wrong Python fails PRE-merge instead of at
  # deploy (the actual defect: config#468's CI was green while the deploy
  # was doomed).
  lockfile-python-parity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version-file: .python-version

      - name: Install uv
        run: pip install uv

      - name: Dry-run install compiled lockfile under SSoT Python
        run: |
          PYVER="$(cat .python-version)"
          echo "Verifying requirements.txt installs cleanly under Python $PYVER"
          uv venv --python "$PYVER" /tmp/lockfile-parity-venv
          uv pip install --python /tmp/lockfile-parity-venv/bin/python -r requirements.txt

  # Alert (Telegram) ONLY on genuine post-merge breakage of the default
  # branch. PR-branch reds (mid-fix commits, cross-repo lib-tag merge-order
  # races) stay silent. Reusable workflow + transport in nousergon-lib.
  # See alpha-engine-config#1128.
  notify-main-failure:
    needs: [test, lockfile-python-parity]
    if: ${{ failure() && github.ref == 'refs/heads/main' }}
    uses: nousergon/nousergon-lib/.github/workflows/notify-ci-failure.yml@main
    secrets: inherit
