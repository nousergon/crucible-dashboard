name: waitlist-probe

# Synthetic end-to-end probe for the beta-waitlist capture path on the product
# marketing sites (metron.nousergon.ai, vires.nousergon.ai). A launch-day
# manual test only proves launch-day health; this probe re-verifies the live
# path daily so a silent regression can't eat signups for days — which already
# happened once: a repo-root `wrangler pages deploy` shipped the static site
# WITHOUT the Pages Functions and the Metron waitlist returned 405 from
# 2026-06-28 until 2026-07-02 (see deploy-marketing.yml header).
#
# Topology (URL swap 2026-07-18): vires.nousergon.ai now serves BOTH the
# marketing/waitlist site (root) and the live Vires app (/app*, Worker-routed
# via vires-app-proxy to its own EC2 origin) — see marketing-vires/README.md.
# fitness.nousergon.ai, the OLD marketing domain, now redirects to
# vires.nousergon.ai; the `fitness-redirect` job below asserts that redirect
# stays live so the old bookmarked/linked URL never silently 404s.
#
# How the probe works — and why it is side-effect-free:
#   1. GET the landing page: asserts 200 + the waitlist form marker is present
#      (catches a broken static deploy / DNS / Pages project detach).
#   2. POST a fixed canary email (waitlist-canary@nousergon.ai, source
#      "synthetic-probe") to /api/waitlist. The function INSERT OR IGNOREs on
#      the email primary key, so after the first-ever insert this is a no-op
#      row-wise AND sends no confirmation email (new-signups-only) — yet it
#      still executes the D1 write, so it exercises routing -> Pages Function
#      -> D1 binding end-to-end. Failure modes it catches: 405 = functions not
#      deployed (the 2026-06-28 outage mode), 500 = D1 binding/DB broken,
#      non-JSON/ok:false = anything else off the happy path.
#
# Alerting: on a main-ref failure the shared notify-ci-failure workflow fires
# (Telegram + Fleet CI Watch agent dispatch) — same path as post-merge CI reds,
# so waitlist breakage flows into the standard overseer/alert-drain machinery.
# The latest run on the Actions page is the "is it healthy right now" surface;
# console tile follow-up tracked in alpha-engine-config.

on:
  schedule:
    - cron: "15 10 * * *" # daily 10:15 UTC = 06:15 ET, ahead of the ET morning
  workflow_dispatch:

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - site: metron
            base: https://metron.nousergon.ai
          - site: vires
            base: https://vires.nousergon.ai # app lives under /app on this same host; fitness.nousergon.ai redirects here
    steps:
      - name: Landing page serves the waitlist form
        run: |
          code=$(curl -sS -o /tmp/landing.html -w '%{http_code}' --max-time 30 "${{ matrix.base }}/")
          if [ "$code" != "200" ]; then
            echo "::error::${{ matrix.site }} landing GET returned HTTP $code (expected 200)"
            exit 1
          fi
          if ! grep -qiE 'waitlist|join the beta' /tmp/landing.html; then
            echo "::error::${{ matrix.site }} landing loaded but the waitlist form marker is missing"
            exit 1
          fi
          echo "landing OK (200, form marker present)"

      - name: Capture path end-to-end (canary POST)
        run: |
          body=$(curl -sS --max-time 30 -o /tmp/resp.json -w '%{http_code}' \
            -X POST "${{ matrix.base }}/api/waitlist" \
            -H 'content-type: application/json' \
            -d '{"email":"waitlist-canary@nousergon.ai","source":"synthetic-probe"}')
          echo "status=$body response=$(cat /tmp/resp.json)"
          if [ "$body" != "200" ]; then
            echo "::error::${{ matrix.site }} waitlist POST returned HTTP $body (405 = Pages Functions not deployed; 500 = D1 write failed)"
            exit 1
          fi
          if ! grep -q '"ok"[[:space:]]*:[[:space:]]*true' /tmp/resp.json; then
            echo "::error::${{ matrix.site }} waitlist POST returned 200 but body was not ok:true"
            exit 1
          fi
          echo "capture path OK (200 ok:true — D1 write path exercised)"

      - name: Run summary
        if: always()
        run: |
          echo "**${{ matrix.site }}** (${{ matrix.base }}) probe: ${{ job.status }}" >> "$GITHUB_STEP_SUMMARY"

  # Independent check: fitness.nousergon.ai (the OLD Vires marketing domain,
  # pre URL-topology-swap) must keep 3xx-redirecting to vires.nousergon.ai —
  # catches an accidental redirect-rule removal/DNS detach that would silently
  # 404 every old bookmarked/linked fitness.nousergon.ai URL.
  fitness-redirect:
    runs-on: ubuntu-latest
    steps:
      - name: fitness.nousergon.ai redirects to vires.nousergon.ai
        run: |
          out=$(curl -sS -o /dev/null -w '%{http_code} %{redirect_url}' --max-time 30 "https://fitness.nousergon.ai/")
          code="${out%% *}"
          location="${out#* }"
          echo "fitness.nousergon.ai/ -> status=$code location=$location"
          case "$code" in
            301|302|307|308)
              ;;
            *)
              echo "::error::fitness.nousergon.ai/ returned HTTP $code (expected a 301/302/307/308 redirect to vires.nousergon.ai)"
              exit 1
              ;;
          esac
          host=$(echo "$location" | sed -E 's#^[a-zA-Z]+://##; s#[/:].*$##')
          if [ "$host" != "vires.nousergon.ai" ]; then
            echo "::error::fitness.nousergon.ai/ redirected to '$location' (host '$host'), expected host vires.nousergon.ai"
            exit 1
          fi
          echo "redirect OK ($code -> $location)"

  # Telegram + Fleet CI Watch dispatch, only for real (main-ref) probe failures —
  # same gating convention as ci.yml's notify-main-failure.
  notify-failure:
    needs: [probe, fitness-redirect]
    if: ${{ failure() && github.ref == 'refs/heads/main' }}
    uses: nousergon/nousergon-lib/.github/workflows/notify-ci-failure.yml@main
    secrets: inherit
