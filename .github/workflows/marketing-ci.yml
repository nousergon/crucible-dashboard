name: marketing-ci

# Build + type-check + lint for the Astro static sites: marketing/ (the
# Crucible product site, crucible.nousergon.ai) and marketing-apex/ (the
# Nous Ergon lab landing, nousergon.ai — also builds the Hugo blog into
# its public/). Path-scoped so changes outside the sites don't trigger this
# workflow, and the Python-side dashboard CI doesn't run on site-only
# changes either. Mirrors the "fail-loud" discipline from
# ~/Development/CLAUDE.md item 3 — astro check treats type errors as hard
# failures so they can't ship silently.

on:
  pull_request:
    paths:
      - marketing/**
      - marketing-apex/**
      - marketing-metron/**
      - marketing-vires/**
      - marketing-finance/**
      - marketing-dev/**
      - marketing-telos/**
      - blog/**
      - .github/workflows/marketing-ci.yml
  push:
    branches: [main]
    paths:
      - marketing/**
      - marketing-apex/**
      - marketing-metron/**
      - marketing-vires/**
      - marketing-finance/**
      - marketing-dev/**
      - marketing-telos/**
      - blog/**
      - .github/workflows/marketing-ci.yml
  workflow_dispatch:

jobs:
  build:
    name: build + check + lint (${{ matrix.site }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        site: [marketing, marketing-apex, marketing-metron, marketing-vires, marketing-finance, marketing-dev, marketing-telos]
    defaults:
      run:
        working-directory: ${{ matrix.site }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: ${{ matrix.site }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (Biome)
        run: npm run lint

      - name: Format check (Biome)
        run: npm run format:check

      - name: Type check + build (astro check && astro build)
        run: npm run build

      - name: Verify sitemap emitted
        run: |
          test -f dist/sitemap-index.xml \
            || (echo 'sitemap-index.xml not emitted — @astrojs/sitemap regressed' && exit 1)
          test -f dist/robots.txt \
            || (echo 'robots.txt missing from build output' && exit 1)

  notify-main-failure:
    needs: [build]
    if: ${{ failure() && github.ref == 'refs/heads/main' }}
    uses: nousergon/nousergon-lib/.github/workflows/notify-ci-failure.yml@main
    secrets: inherit
