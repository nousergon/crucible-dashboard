name: marketing-ci

# Build + type-check + lint for the Astro static site at marketing/. Path-scoped
# so changes outside marketing/ don't trigger this workflow, and the Python-side
# dashboard CI doesn't run on marketing-only changes either. Mirrors the
# "fail-loud" discipline from ~/Development/CLAUDE.md item 3 — astro check
# treats type errors as hard failures so they can't ship to apex silently.

on:
  pull_request:
    paths:
      - marketing/**
      - blog/**
      - .github/workflows/marketing-ci.yml
  push:
    branches: [main]
    paths:
      - marketing/**
      - blog/**
      - .github/workflows/marketing-ci.yml
  workflow_dispatch:

jobs:
  build:
    name: build + check + lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: marketing
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: marketing/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (Biome)
        run: npm run lint

      - name: Format check (Biome)
        run: npm run format:check

      - name: Type check + build (astro check && astro build)
        run: npm run build

      - name: Verify sitemap emitted
        run: |
          test -f dist/sitemap-index.xml \
            || (echo 'sitemap-index.xml not emitted — @astrojs/sitemap regressed' && exit 1)
          test -f dist/robots.txt \
            || (echo 'robots.txt missing from build output' && exit 1)
