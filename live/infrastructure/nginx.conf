# /etc/nginx/conf.d/nousergon.conf
#
# Serves two Streamlit apps behind Cloudflare:
#   nousergon.ai             → public portfolio page  (port 8502)
#   dashboard.nousergon.ai   → private full dashboard (port 8501)
#
# SSL terminated by Cloudflare Origin CA certificate.
# Cloudflare Access protects the dashboard subdomain (zero code changes).

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name nousergon.ai www.nousergon.ai dashboard.nousergon.ai;
    return 301 https://$host$request_uri;
}

# Public site
server {
    listen 443 ssl;
    server_name nousergon.ai www.nousergon.ai;

    ssl_certificate     /etc/ssl/certs/cloudflare-origin.pem;
    ssl_certificate_key /etc/ssl/private/cloudflare-origin.key;

    # Rewrite Streamlit's default OG meta tags for link previews
    sub_filter_once off;
    sub_filter_types text/html;
    sub_filter '<meta property="og:site_name" content="Streamlit"' '<meta property="og:site_name" content="Nous Ergon: Alpha Engine"';
    sub_filter '<meta property="og:title" content="Streamlit"' '<meta property="og:title" content="Nous Ergon: Alpha Engine"';
    sub_filter '<meta name="description" content="Streamlit' '<meta name="description" content="AI-driven autonomous trading system generating alpha over the S&P 500. Built by Brian McMahon.';

    # Blog — static Hugo site served from /var/www/blog/
    # Built from alpha-engine-dashboard/blog/ via Hugo, deployed by blog/deploy.sh
    location = /blog {
        return 301 /blog/;
    }

    location /blog/ {
        alias /var/www/blog/;
        try_files $uri $uri/ /blog/index.html;
    }

    location / {
        proxy_pass http://127.0.0.1:8502;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Accept-Encoding "";
        proxy_read_timeout 86400;
    }
}

# Private dashboard (protected by Cloudflare Access)
server {
    listen 443 ssl;
    server_name dashboard.nousergon.ai;

    ssl_certificate     /etc/ssl/certs/cloudflare-origin.pem;
    ssl_certificate_key /etc/ssl/private/cloudflare-origin.key;

    location / {
        proxy_pass http://127.0.0.1:8501;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }
}
