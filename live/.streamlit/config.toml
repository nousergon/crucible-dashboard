[theme]
primaryColor = "#1a73e8"
backgroundColor = "#0e1117"
secondaryBackgroundColor = "#1a1f2e"
textColor = "#fafafa"
font = "sans serif"

[server]
maxUploadSize = 0
# Served under crucible.nousergon.ai/live via a Cloudflare Worker path-proxy
# (site_restructure_plan_260612.md §4) — assets + websocket resolve under /live.
baseUrlPath = "live"
# The proxy forwards browser Origin: https://crucible.nousergon.ai while the
# request Host stays live.nousergon.ai, so Tornado's same-host check fails and
# Streamlit rejects every WebSocket handshake ("Rejecting WebSocket connection
# from disallowed origin") — the app hangs on load. Allowlist the public origin.
corsAllowedOrigins = ["https://crucible.nousergon.ai"]

[browser]
gatherUsageStats = false
